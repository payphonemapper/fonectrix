<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | Fonectrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #0f172a;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6 text-center">

    <!-- Branding Image -->
    <div class="mb-12">
        <img 
            src="https://raw.githubusercontent.com/payphonemapper/webimages/main/fonectrix%20part%20of%20pfm.png" 
            alt="Fonectrix" 
            class="w-full max-w-[240px] h-auto mx-auto"
        >
    </div>

    <!-- Error Message -->
    <h1 class="text-7xl font-bold mb-2 text-slate-900">404</h1>
    <p class="text-sky-600 font-mono text-sm uppercase tracking-widest mb-8">Signal Lost / Location Not Found</p>
    
    <p class="text-slate-500 text-sm max-w-xs mx-auto mb-4">
        The requested directory path could not be resolved. This entry may have been removed or moved.
    </p>

    <!-- Countdown Timer -->
    <p class="text-slate-400 text-xs uppercase tracking-tighter mb-12">
        Automatic redirection in <span id="timer" class="font-bold text-sky-600">10</span> seconds...
    </p>

    <!-- Navigation Buttons -->
    <div class="space-y-4 w-full max-w-xs">
        <a href="https://fonectrix.info" class="block w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded text-sm uppercase transition-colors shadow-sm">
            Return to Index
        </a>
        <a href="https://payfonemap.com" class="block w-full border border-slate-200 hover:bg-slate-50 text-slate-600 py-3 px-6 rounded text-sm uppercase transition-colors">
            Go to PayFoneMap
        </a>
    </div>

    <script>
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const redirectUrl = 'https://fonectrix.info';

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = redirectUrl;
            }
        }, 1000);
    </script>

</body>
</html>
