<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonectrix Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --brand-blue: #354eef;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--brand-blue);
            color: white;
        }

        .drawer-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-drawer { transform: translateX(100%); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .list-item-hover:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        ::selection {
            background-color: white;
            color: var(--brand-blue);
        }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen">

    <!-- Navigation -->

                 alt="Fonectrix Archive" 
                 class="h-8 md:h-10 w-auto transition-opacity group-hover:opacity-75 brightness-0 invert" 
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/200x40?text=Fonectrix+Archive';">
        </div>
        <div class="flex items-center gap-4 md:gap-6">
            <button onclick="setView('list')" id="btn-list" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-white transition-colors cursor-pointer" data-t="nav_index">Index</button>
            <a href="https://fonectrix.info" target="_blank" rel="noopener" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-white/70 hover:text-white flex items-center gap-1.5 transition-colors group/link" data-t="hero_active_btn">
                <span>Find Active Booths</span>
                <i data-lucide="arrow-up-right" class="w-3 h-3 opacity-50 group-hover/link:opacity-100 transition-opacity"></i>
            </a>
            <button onclick="setView('settings')" id="btn-settings" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-white/40 hover:text-white transition-colors cursor-pointer" data-t="nav_settings">Settings</button>
        </div>
    </nav>

                        Keeping Booths Easy to Remember

            </div>

                        type="text" 
                        placeholder="Search locations or enter the Booth ID..."

            </div>

            <div id="directory-list" class="divide-y divide-white/5"></div>

        let currentSearch = '';
        let currentCountry = '';
        let currentView = 'list';
        let currentLang = 'en';
        let booths = [];

        function parseCSV(text) {
            const lines = text.trim().split("\n");
            const headers = lines[0].split(",");
            return lines.slice(1).map(line => {
                const values = line.split(/,(?=(?:(?:[^\"]*\"){2})*[^\"]*$)/);
                const obj = {};
                headers.forEach((h, i) => {
                    const cleanH = h.trim();
                    const cleanV = values[i]?.replace(/^\"|\"$/g, "").trim() || "";
                    obj[cleanH] = cleanV;
                });
                return obj;
            });
        }

        function init() {
            booths = parseCSV(CSV_DATA);
            applyLanguage();
            renderFilters();
            renderList();
            lucide.createIcons();
        }

        function applyLanguage() {
            const langData = I18N[currentLang] || I18N.en;
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (langData[key]) el.textContent = langData[key];
            });
            document.querySelectorAll('[data-t-placeholder]').forEach(el => {
                const key = el.getAttribute('data-t-placeholder');
                if (langData[key]) el.placeholder = langData[key];
            });
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.id === `lang-${currentLang}`;
                btn.className = `px-4 py-2 border rounded-xl text-xs font-bold transition-all lang-btn ${isActive ? 'bg-white text-[#354eef] border-white' : 'border-white/10 text-white hover:border-white'}`;
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            applyLanguage();
            renderFilters();
            renderList();
        }

        function renderFilters() {
            const container = document.getElementById('country-filters');
            const countries = [...new Set(booths.map(b => b.Country))].filter(Boolean).sort();
            
            const getBtnClass = (isActive) => {
                const base = "px-3 py-1.5 text-[10px] font-bold uppercase rounded-full border cursor-pointer transition-all";
                if (isActive) return `${base} bg-white/20 border-white text-white`;
                return `${base} border-white/10 text-white/50 hover:border-white/30`;
            };

            let html = `<button onclick="setCountry('')" class="${getBtnClass(!currentCountry)}">All Global</button>`;
            
            countries.forEach(c => {
                const isActive = currentCountry === c;
                html += `<button onclick="setCountry('${c}')" class="${getBtnClass(isActive)}">${c}</button>`;
            });
            container.innerHTML = html;
        }

        function renderList() {
            const container = document.getElementById('directory-list');
            const term = currentSearch.toLowerCase();
            const filtered = booths.filter(p => {
                const searchable = `${p['Booth ID']} ${p.Description} ${p['Province/State']} ${p.Country}`.toLowerCase();
                const matchesSearch = searchable.includes(term);
                const matchesCountry = !currentCountry || p.Country === currentCountry;
                return matchesSearch && matchesCountry;
            });

            if (filtered.length === 0) {
                const lang = I18N[currentLang] || I18N.en;
                container.innerHTML = `<div class="py-24 text-center space-y-4"><span class="text-4xl">🔎</span><p class="text-white/40 font-light italic">${lang.no_results}</p><button onclick="resetState()" class="text-[10px] font-black uppercase tracking-widest text-white border-b border-white/20 hover:border-white cursor-pointer">${lang.clear_search}</button></div>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="py-10 group cursor-pointer flex justify-between items-center transition-all hover:translate-x-1 list-item-hover px-4 -mx-4 rounded-xl" onclick="openDrawer('${p['Booth ID']}')">
                    <div class="space-y-2 min-w-0 pr-4">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black bg-white/10 border border-white/10 px-1.5 py-0.5 rounded text-white/60 group-hover:bg-white group-hover:text-[#354eef] transition-colors shrink-0 uppercase tracking-tighter">
                                ${p['Booth ID']}
                            </span>
                            <h3 class="text-xl font-semibold text-white tracking-tight truncate">${p['Province/State']}, ${p.Country}</h3>
                        </div>
                        <p class="text-sm text-white/50 max-w-xl truncate font-light leading-relaxed">${p.Description}</p>
                    </div>
                    <i data-lucide="chevron-right" class="text-white/20 group-hover:text-white transition-all shrink-0"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function handleSearch(val) { currentSearch = val; renderList(); }
        function setCountry(c) { currentCountry = c; renderFilters(); renderList(); }

        function setView(v) {
            currentView = v;
            document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
            document.getElementById('view-settings').classList.toggle('hidden', v !== 'settings');
            ['list', 'settings'].forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                btn.className = `text-[10px] md:text-xs font-bold uppercase tracking-widest transition-colors cursor-pointer ${v === id ? 'text-white' : 'text-white/40 hover:text-white'}`;
            });
        }

        function resetState() {
            currentSearch = ''; currentCountry = '';
            document.getElementById('search-input').value = '';
            setView('list'); renderFilters(); renderList();
        }

        function openHelpModal(qKey, aKey) {
            const lang = I18N[currentLang] || I18N.en;
            const title = lang[qKey];
            const body = lang[aKey];
            
            document.getElementById('help-modal-title').textContent = title;
            document.getElementById('help-modal-body').innerHTML = body.replace(/\n/g, '<br>');
            
            const actionContainer = document.getElementById('help-modal-action-container');
            if (qKey === 'faq_q3') {
                actionContainer.innerHTML = `
                    <div class="flex flex-col gap-3">
                        <a href="https://payfonemap.com/report-a-booth" target="_blank" class="w-full py-4 bg-[#354eef] text-white rounded-2xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all uppercase tracking-widest text-xs">
                            <i data-lucide="external-link" size="16"></i> ${lang.faq_btn3}
                        </a>
                        <button onclick="closeHelpModal()" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors uppercase tracking-widest text-xs">Close</button>
                    </div>
                `;
            } else {
                actionContainer.innerHTML = `<button onclick="closeHelpModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-colors uppercase tracking-widest text-xs">Got it</button>`;
            }
            
            const modal = document.getElementById('help-modal');
            const bg = document.getElementById('help-modal-bg');
            const content = document.getElementById('help-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                bg.classList.replace('opacity-0', 'opacity-100');
                content.classList.replace('scale-90', 'scale-100');
                content.classList.replace('opacity-0', 'opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeHelpModal() {
            const bg = document.getElementById('help-modal-bg');
            const content = document.getElementById('help-modal-content');
            bg.classList.replace('opacity-100', 'opacity-0');
            content.classList.replace('scale-100', 'scale-90');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                document.getElementById('help-modal').classList.add('hidden');
                if (!document.getElementById('drawer-overlay').classList.contains('hidden')) return;
                document.body.style.overflow = '';
            }, 300);
        }

        function openDrawer(id) {
            const booth = booths.find(b => b['Booth ID'] === id);
            if (!booth) return;
            const body = document.getElementById('drawer-body');
            const lang = I18N[currentLang] || I18N.en;
            body.innerHTML = `
                <div class="space-y-4 text-slate-900">
                    <span class="text-[10px] font-black uppercase text-[#354eef] tracking-widest">${booth['Booth ID']}</span>
                    <h2 class="text-4xl md:text-5xl font-black tracking-tighter leading-none">${booth['Province/State']}</h2>
                    <p class="text-xl text-slate-400 font-light tracking-tight">${booth.Country}</p>
                </div>
                <div class="space-y-10 pt-4">
                    <div class="flex gap-5"><div class="shrink-0 mt-1 text-slate-300"><i data-lucide="info" size="20"></i></div><div><span class="text-[9px] font-black uppercase text-slate-400 tracking-widest block mb-1">${lang.drawer_observation}</span><p class="text-slate-600 font-light leading-relaxed text-sm md:text-base">${booth.Description}</p></div></div>
                    <div class="flex gap-5"><div class="shrink-0 mt-1 text-slate-300"><i data-lucide="map-pin" size="20"></i></div><div><span class="text-[9px] font-black uppercase text-slate-400 tracking-widest block mb-1">${lang.drawer_geodata}</span><code class="text-xs bg-slate-50 px-2 py-1 rounded text-slate-500 font-mono tracking-tighter">${booth.Coordinates}</code></div></div>
                    ${booth['Removal Date'] ? `<div class="flex gap-5"><div class="shrink-0 mt-1 text-slate-300"><i data-lucide="calendar-x" size="20"></i></div><div><span class="text-[9px] font-black uppercase text-slate-400 tracking-widest block mb-1">${lang.drawer_removal}</span><p class="text-red-600 font-bold leading-relaxed text-sm md:text-base">${booth['Removal Date']}</p></div></div>` : ''}
                </div>
                <div class="pt-8"><a href="https://www.google.com/maps?q=${booth.Coordinates.replace(/ /g, '')}" target="_blank" class="w-full bg-[#354eef] text-white h-14 rounded-2xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all hover:scale-[1.02] active:scale-95 shadow-lg shadow-[#354eef]/20"><i data-lucide="external-link" size="18"></i> ${lang.drawer_maps_btn}</a></div>
            `;
            const overlay = document.getElementById('drawer-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('drawer-bg').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('drawer-content').classList.remove('hidden-drawer');
            }, 10);
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeDrawer() {
            document.getElementById('drawer-bg').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('drawer-content').classList.add('hidden-drawer');
            setTimeout(() => {
                document.getElementById('drawer-overlay').classList.add('hidden');
                document.body.style.overflow = '';
            }, 400);
        }

        window.onload = init;
    </script>
